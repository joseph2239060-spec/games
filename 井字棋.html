<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cute Tic-Tac-Toe — Free Two-Player Game</title>
<meta name="description" content="Play Cute Tic-Tac-Toe free online with a friend on one screen. The classic two-player 3×3 game — get three in a row to win. No download — works on phone, tablet and desktop.">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: "PingFang SC", "Microsoft YaHei", "Heiti SC", sans-serif;
    background: linear-gradient(165deg, #fff1f6 0%, #e9f7ff 55%, #f3f0ff 100%);
    color: #5a4a6a; min-height: 100vh; padding: 14px; overflow-x: hidden;
  }
  .page { display: flex; justify-content: center; align-items: flex-start; gap: 22px; }
  .wrap { flex: 0 1 1120px; min-width: 0; }
  .topbar { display:flex; align-items:center; justify-content:center; position:relative; margin:2px 0 14px; }
  h1 { text-align:center; font-size:28px; margin:0; letter-spacing:4px; color:#ff6fa5; font-weight:900; text-shadow:0 2px 6px rgba(255,111,165,.2); }
  .langbar { position:absolute; right:0; top:50%; transform:translateY(-50%); display:flex; gap:4px; }
  .langbar button { border:2px solid #ffd0e3; background:#fff; color:#ff6fa5; font-weight:800; font-size:12px; padding:5px 9px; border-radius:11px; cursor:pointer; font-family:inherit; }
  .langbar button.on { background:#ff6fa5; color:#fff; border-color:#ff6fa5; }

  .game { display:flex; gap:24px; align-items:stretch; }
  .left { flex:2; min-width:0; display:flex; align-items:flex-start; justify-content:center; }
  .right { flex:1; min-width:300px; display:flex; flex-direction:column; gap:16px; }
  @media (max-width: 820px) { .game { flex-direction:column; } .right { min-width:0; } }

  .board {
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    aspect-ratio:1/1; width:100%; max-width:380px; margin:0 auto;
    background:linear-gradient(160deg,#ffeccb,#f5d6a8); padding:16px; border-radius:24px;
    border:5px solid #ffd6a0; box-shadow:0 8px 22px rgba(210,150,90,.3), inset 0 0 0 2px #f0c896;
  }
  .cell { position:relative; cursor:pointer; border-right:2px solid rgba(150,100,50,.32); border-bottom:2px solid rgba(150,100,50,.32); }
  .cell.last-col { border-right:none; } .cell.last-row { border-bottom:none; }
  .cell:hover::before { content:''; position:absolute; inset:20%; border-radius:50%; background:rgba(255,255,255,.45); }
  .cell.taken { cursor:default; } .cell.taken:hover::before { display:none; }
  .stone { position:absolute; inset:16%; border-radius:50%; animation:pop .18s cubic-bezier(.3,1.7,.5,1); z-index:2; }
  .stone.r { background:radial-gradient(circle at 35% 30%, #ffd6e6,#ff6fa5 58%,#e34d86); box-shadow:0 2px 4px rgba(180,50,100,.45), inset 0 -3px 5px rgba(180,50,100,.4), inset 0 3px 5px rgba(255,255,255,.6); }
  .stone.b { background:radial-gradient(circle at 35% 30%, #d4ecff,#56b4ff 58%,#2f8fe6); box-shadow:0 2px 4px rgba(40,110,180,.45), inset 0 -3px 5px rgba(40,110,180,.4), inset 0 3px 5px rgba(255,255,255,.6); }
  @keyframes pop { 0%{ transform:scale(0);} 100%{ transform:scale(1);} }
  .stone.win { animation:winpulse .7s ease infinite; box-shadow:0 0 0 3px #ffd76b, 0 0 14px #ffd76b; }
  @keyframes winpulse { 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.15);} }

  .bubble { background:#fff; border:3px solid #ffd0e3; color:#ff6fa5; font-weight:900; font-size:19px; padding:12px 18px; border-radius:20px; box-shadow:0 4px 0 #ffd0e3; text-align:center; }
  .players { display:flex; gap:12px; }
  .pcard { flex:1; border-radius:18px; padding:12px; border:3px solid #fff; text-align:center; box-shadow:0 4px 0 rgba(150,120,150,.15); transition:transform .15s; }
  .pcard.p0 { background:linear-gradient(160deg,#fff0f6,#ffe0ec); }
  .pcard.p1 { background:linear-gradient(160deg,#eef6ff,#dcecff); }
  .pcard.active { transform:translateY(-3px) scale(1.03); }
  .pcard.p0.active { border-color:#ff6b9d; box-shadow:0 0 0 2px #ff6b9d,0 6px 0 #ffc9dd; }
  .pcard.p1.active { border-color:#56b4ff; box-shadow:0 0 0 2px #56b4ff,0 6px 0 #c2e1ff; }
  .pcard .dot { width:34px; height:34px; border-radius:50%; margin:0 auto 6px; }
  .pcard .dot.r { background:radial-gradient(circle at 35% 30%, #ffd6e6,#ff6fa5 58%,#e34d86); box-shadow:inset 0 -3px 4px rgba(180,50,100,.4),inset 0 3px 4px rgba(255,255,255,.6);}
  .pcard .dot.b { background:radial-gradient(circle at 35% 30%, #d4ecff,#56b4ff 58%,#2f8fe6); box-shadow:inset 0 -3px 4px rgba(40,110,180,.4),inset 0 3px 4px rgba(255,255,255,.6);}
  .pcard .nm { font-weight:900; font-size:16px; }
  .pcard .cnt { font-size:12px; color:#9a8aaa; margin-top:2px; }
  .tip { background:#fff; border:3px solid #ffe1ee; border-radius:16px; padding:12px 14px; font-size:14px; line-height:1.7; color:#9a8aaa; flex:1; }
  .tip b { color:#ff6fa5; }
  .actions { display:flex; gap:12px; }
  button.act { flex:1; border:none; border-radius:18px; padding:15px; font-size:17px; font-weight:900; font-family:inherit; color:#fff; background:linear-gradient(180deg,#ff9ec6,#ff6fa5); box-shadow:0 5px 0 #e34d86; cursor:pointer; transition:transform .08s,box-shadow .08s; }
  button.act:active { transform:translateY(4px); box-shadow:0 1px 0 #e34d86; }
  button.act.ghost { background:linear-gradient(180deg,#cfd8ff,#9fb2f5); box-shadow:0 5px 0 #6f86d8; }
  .about { margin:24px 0 0; background:#fff; border:3px solid #ffe1ee; border-radius:18px; padding:18px 22px; color:#7a6a8a; line-height:1.8; font-size:14.5px; }
  .about h2 { margin:0 0 8px; font-size:18px; color:#ff6fa5; } .about p { margin:0 0 8px; } .about b { color:#ff6fa5; }
  .ad-rail { flex:0 0 160px; height:600px; position:sticky; top:14px; background:repeating-linear-gradient(45deg,#fff6fb,#fff6fb 12px,#fdeef6 12px,#fdeef6 24px); border:2px dashed #ffc2da; border-radius:16px; display:flex; align-items:center; justify-content:center; color:#d99ab8; font-weight:800; font-size:14px; text-align:center; padding:10px; }
  @media (max-width: 1520px) { .ad-rail { display:none; } }
  .overlay { position:fixed; inset:0; background:rgba(90,60,90,.45); display:none; align-items:center; justify-content:center; z-index:10; }
  .overlay.show { display:flex; }
  .modal { background:#fff; border:4px solid #ffd0e3; border-radius:26px; padding:30px 28px; text-align:center; max-width:320px; box-shadow:0 14px 40px rgba(255,120,170,.4); }
  .modal h2 { margin:0 0 10px; font-size:28px; color:#ff6fa5; } .modal p { margin:0 0 20px; font-size:15px; color:#9a8aaa; }
  .modal button { width:100%; border:none; border-radius:18px; padding:15px; font-size:17px; font-weight:900; font-family:inherit; color:#fff; background:linear-gradient(180deg,#ff9ec6,#ff6fa5); box-shadow:0 5px 0 #e34d86; cursor:pointer; }
</style>
</head>
<body>
<div class="page">
<aside class="ad-rail left">📢 Ad<br>(left)</aside>
<div class="wrap">
  <div class="topbar">
    <h1 id="h1">🎀 Cute Tic-Tac-Toe 🎀</h1>
    <div class="langbar">
      <button data-lang="en" onclick="setLang('en')" class="on">EN</button>
      <button data-lang="zh" onclick="setLang('zh')">中</button>
      <button data-lang="es" onclick="setLang('es')">ES</button>
    </div>
  </div>
  <div class="game">
    <div class="left"><div class="board" id="board"></div></div>
    <div class="right">
      <div class="bubble" id="bubble">Turn: 🐰 Rabbit</div>
      <div class="players">
        <div class="pcard p0 active" id="pcard0"><div class="dot r"></div><div class="nm" id="nm0">🐰 Rabbit</div><div class="cnt" id="cnt0">Wins: 0</div></div>
        <div class="pcard p1" id="pcard1"><div class="dot b"></div><div class="nm" id="nm1">🐱 Cat</div><div class="cnt" id="cnt1">Wins: 0</div></div>
      </div>
      <div class="tip" id="tip"></div>
      <div class="actions">
        <button class="act ghost" id="undoBtn" onclick="undo()">↩️ Undo</button>
        <button class="act" id="restartBtn" onclick="restart()">🔄 Restart</button>
      </div>
    </div>
  </div>
  <div class="about"><h2 id="aboutTitle">About Cute Tic-Tac-Toe</h2><div id="aboutBody"></div></div>
</div>
<aside class="ad-rail right">📢 Ad<br>(right)</aside>
</div>

<div class="overlay" id="overlay">
  <div class="modal"><h2 id="modalTitle"></h2><p id="modalText"></p><button onclick="restart()" id="againBtn">🎀 Play again</button></div>
</div>

<script>
"use strict";
const STR = {
  en: { title:'🎀 Cute Tic-Tac-Toe 🎀', titlePlain:'Cute Tic-Tac-Toe — Free Two-Player Game',
    turn:'Turn: {tok} {name}', gameEnd:'🎉 Game over', cnt:'Wins: {n}',
    undoBtn:'↩️ Undo', restartBtn:'🔄 Restart', againBtn:'🎀 Play again',
    winTitle:'🏆 {tok} {name} wins!', winText:'Three in a row — nice!',
    drawTitle:'🤝 Draw', drawText:'Board full — nobody wins.',
    names:['Rabbit','Cat'], aboutTitle:'About Cute Tic-Tac-Toe',
    aboutBody:'<p><b>Cute Tic-Tac-Toe</b> is the classic two-player game on a 3×3 grid.</p><p>Players take turns. The first to get <b>three of their own marks in a row</b> — across, down, or diagonal — wins. The winner of a round goes first next round. Quick, easy and fun. Play with a friend on one screen — phone, tablet or computer — free and no download.</p>',
    tip:'🎯 <b>How to play</b>: take turns tapping a square.<br>First to get <b>3 in a row</b><br>(row, column, or diagonal) wins!<br><br>🏆 The winner of a round goes first next round.<br>(Rabbit 🐰 starts the first game.)' },
  zh: { title:'🎀 萌萌井字棋 🎀', titlePlain:'萌萌井字棋 — 免费在线双人井字棋',
    turn:'轮到 {tok} {name}', gameEnd:'🎉 游戏结束', cnt:'胜场 {n}',
    undoBtn:'↩️ 悔棋', restartBtn:'🔄 重新开始', againBtn:'🎀 再来一局',
    winTitle:'🏆 {tok} {name} 获胜！', winText:'三子连线，赢啦～',
    drawTitle:'🤝 平局', drawText:'棋盘满了，不分胜负～',
    names:['兔兔','猫猫'], aboutTitle:'关于萌萌井字棋',
    aboutBody:'<p><b>井字棋</b>是经典的双人游戏，在 3×3 的格子里对弈。</p><p>两人轮流落子，谁先把<b>三颗自己的棋子连成一条线</b>（横、竖或斜）就获胜。上一局赢的人下一局先手。简单、快速、又好玩。和朋友用同一台设备就能玩，手机、平板、电脑都行，免费、免下载。</p>',
    tip:'🎯 <b>玩法</b>：两人轮流点格子，<br>谁先把 <b>3 颗自己的棋子连成一条线</b><br>（横、竖、或斜），谁就赢啦！<br><br>🏆 上一局赢的人，下一局先手！<br>（第一局 🐰 兔兔先手）' },
  es: { title:'🎀 Tres en Raya Lindo 🎀', titlePlain:'Tres en Raya Lindo — Juego Gratis para Dos',
    turn:'Turno: {tok} {name}', gameEnd:'🎉 Fin del juego', cnt:'Victorias: {n}',
    undoBtn:'↩️ Deshacer', restartBtn:'🔄 Reiniciar', againBtn:'🎀 Jugar otra vez',
    winTitle:'🏆 ¡{tok} {name} gana!', winText:'¡Tres en raya — genial!',
    drawTitle:'🤝 Empate', drawText:'Tablero lleno — nadie gana.',
    names:['Conejo','Gato'], aboutTitle:'Sobre Tres en Raya Lindo',
    aboutBody:'<p><b>Tres en Raya</b> es el clásico juego para dos en un tablero de 3×3.</p><p>Por turnos cada jugador coloca una ficha. El primero en alinear <b>tres fichas propias</b> (en fila, columna o diagonal) gana. El ganador de una ronda empieza la siguiente. Rápido, fácil y divertido. Juega con un amigo en la misma pantalla — móvil, tablet u ordenador — gratis y sin descargas.</p>',
    tip:'🎯 <b>Cómo jugar</b>: por turnos toca una casilla.<br>El primero en alinear <b>3 en raya</b><br>(fila, columna o diagonal) ¡gana!<br><br>🏆 El ganador de una ronda empieza la siguiente.<br>(Conejo 🐰 empieza la primera partida.)' }
};
let lang = localStorage.getItem('mz_lang') || 'en';
const fmt = (s, o) => s.replace(/\{(\w+)\}/g, (_, k) => (o && o[k] !== undefined) ? o[k] : '');
const L = (k, o) => fmt(STR[lang][k], o);
const pName = i => STR[lang].names[i];

const SIZE = 3, NEED = 3;
const P = [ { token:'🐰', cls:'r' }, { token:'🐱', cls:'b' } ];
let board, current, over, history, wins = [0, 0], lastWinner = null;
const $ = id => document.getElementById(id);

function buildBoard() {
  const el = $('board'); el.innerHTML = '';
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    const cell = document.createElement('div'); cell.className = 'cell';
    if (c === SIZE - 1) cell.classList.add('last-col'); if (r === SIZE - 1) cell.classList.add('last-row');
    cell.id = 'c' + r + '_' + c; cell.onclick = () => place(r, c); el.appendChild(cell);
  }
}
function reset() {
  board = Array.from({ length: SIZE }, () => Array(SIZE).fill(-1));
  current = (lastWinner === null) ? 0 : lastWinner; over = false; history = [];
  document.querySelectorAll('.cell').forEach(c => { c.className = 'cell'; c.innerHTML = '';
    const [r, cc] = c.id.slice(1).split('_').map(Number);
    if (cc === SIZE - 1) c.classList.add('last-col'); if (r === SIZE - 1) c.classList.add('last-row'); });
  $('overlay').classList.remove('show'); updatePanel();
}
function updatePanel() {
  $('bubble').textContent = over ? L('gameEnd') : L('turn', { tok: P[current].token, name: pName(current) });
  $('cnt0').textContent = L('cnt', { n: wins[0] }); $('cnt1').textContent = L('cnt', { n: wins[1] });
  $('nm0').textContent = P[0].token + ' ' + pName(0); $('nm1').textContent = P[1].token + ' ' + pName(1);
  $('pcard0').classList.toggle('active', current === 0 && !over);
  $('pcard1').classList.toggle('active', current === 1 && !over);
  $('undoBtn').disabled = history.length === 0 || over;
}
function place(r, c) {
  if (over || board[r][c] !== -1) return;
  history.push({ r, c });
  board[r][c] = current;
  const cell = $('c' + r + '_' + c); cell.classList.add('taken');
  const stone = document.createElement('div'); stone.className = 'stone ' + P[current].cls; cell.appendChild(stone);
  const line = checkWin(r, c, current);
  if (line) {
    over = true; lastWinner = current; wins[current]++;
    line.forEach(([wr, wc]) => $('c' + wr + '_' + wc).querySelector('.stone').classList.add('win'));
    updatePanel();
    setTimeout(() => { $('modalTitle').textContent = L('winTitle', { tok: P[current].token, name: pName(current) });
      $('modalText').textContent = L('winText'); $('overlay').classList.add('show'); }, 450);
    return;
  }
  if (countMarks() === SIZE * SIZE) { over = true; updatePanel();
    $('modalTitle').textContent = L('drawTitle'); $('modalText').textContent = L('drawText'); $('overlay').classList.add('show'); return; }
  current = 1 - current; updatePanel();
}
function countMarks() { let n = 0; for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (board[r][c] !== -1) n++; return n; }
function undo() {
  if (over || history.length === 0) return;
  const last = history.pop();
  board[last.r][last.c] = -1;
  const cell = $('c' + last.r + '_' + last.c); cell.className = 'cell'; cell.innerHTML = '';
  if (last.c === SIZE - 1) cell.classList.add('last-col'); if (last.r === SIZE - 1) cell.classList.add('last-row');
  const start = (lastWinner === null) ? 0 : lastWinner;
  current = (countMarks() % 2 === 0) ? start : 1 - start;
  updatePanel();
}
function checkWin(r, c, p) {
  const dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
  for (const [dr, dc] of dirs) {
    const line = [[r, c]];
    for (let s = 1; s < NEED; s++) { const nr=r+dr*s, nc=c+dc*s; if (nr<0||nc<0||nr>=SIZE||nc>=SIZE||board[nr][nc]!==p) break; line.push([nr,nc]); }
    for (let s = 1; s < NEED; s++) { const nr=r-dr*s, nc=c-dc*s; if (nr<0||nc<0||nr>=SIZE||nc>=SIZE||board[nr][nc]!==p) break; line.unshift([nr,nc]); }
    if (line.length >= NEED) return line;
  }
  return null;
}
function restart() { reset(); }
function applyLang() {
  localStorage.setItem('mz_lang', lang); document.documentElement.lang = lang;
  document.title = STR[lang].titlePlain;
  $('h1').textContent = L('title'); $('tip').innerHTML = L('tip');
  $('aboutTitle').textContent = L('aboutTitle'); $('aboutBody').innerHTML = L('aboutBody');
  $('undoBtn').textContent = L('undoBtn'); $('restartBtn').textContent = L('restartBtn'); $('againBtn').textContent = L('againBtn');
  document.querySelectorAll('.langbar button').forEach(b => b.classList.toggle('on', b.dataset.lang === lang));
  updatePanel();
}
function setLang(l) { lang = l; applyLang(); }
buildBoard(); reset(); applyLang();
</script>
</body>
</html>
